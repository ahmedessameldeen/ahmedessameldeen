name: Update README

on:
  schedule:
    - cron: "0 6 * * *"      # daily at 06:00 UTC
  workflow_dispatch: {}        # allow manual runs
  push:
    branches: [main]
    paths:
      - "scripts/update_readme.py"
      - ".github/workflows/update-readme.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate projects section
        env:
          # Optional: add a repo secret named PROFILE_TOKEN (a PAT with repo scope)
          # to include PRIVATE repos. Without it, only PUBLIC repos are listed.
          PROFILE_TOKEN: ${{ secrets.PROFILE_TOKEN }}
        run: python scripts/update_readme.py

      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain README.md)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: auto-update README projects"
            git push
          else
            echo "No README changes."
          fi
